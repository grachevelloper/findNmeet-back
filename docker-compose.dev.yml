services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: findnmeet
      POSTGRES_PASSWORD: findnmeet
      POSTGRES_DB: findnmeet
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_dev_data:/data

  workspace-bootstrap:
    image: node:20-alpine
    working_dir: /workspace
    environment:
      NODE_ENV: development
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @findnmeet/ts-types build &&
      pnpm --filter @findnmeet/utils build"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_pnpm_store:/root/.local/share/pnpm/store

  auth-service:
    image: node:20-alpine
    working_dir: /workspace
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      pnpm --filter auth-service exec ts-node-dev --respawn --transpile-only src/index.ts"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      workspace-bootstrap:
        condition: service_completed_successfully

  api-gateway:
    image: node:20-alpine
    working_dir: /workspace
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      pnpm --filter api-gateway exec nest start --watch"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      auth-service:
        condition: service_started
      favorites-service:
        condition: service_started
      workspace-bootstrap:
        condition: service_completed_successfully

  vk-gateway:
    image: golang:1.24-alpine
    working_dir: /workspace
    env_file:
      - .env.dev
    command: >
      sh -lc "/usr/local/go/bin/go run ./cmd/server/main.go"
    volumes:
      - ./services/vk-gateway:/workspace
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  favorites-service:
    image: node:20-alpine
    working_dir: /workspace
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@9.15.9 --activate &&
      pnpm --filter favorites-service exec ts-node-dev --respawn --transpile-only src/index.ts"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      vk-gateway:
        condition: service_started
      workspace-bootstrap:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/dev/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/dev/certs/local.findnmeet.ru.pem:/etc/nginx/certs/local.findnmeet.ru.pem:ro
      - ./docker/dev/certs/local.findnmeet.ru-key.pem:/etc/nginx/certs/local.findnmeet.ru-key.pem:ro
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  postgres_dev_data:
  redis_dev_data:
  workspace_node_modules:
  backend_pnpm_store:
  go_pkg_mod:
  go_build_cache:
