syntax = "proto3";

package search.v1;

import "search/v1/models.proto";
import "shared/v1/common_types.proto";

service SearchOrchestratorService {
  rpc SearchPeople(SearchPeopleRequest) returns (SearchPeopleResponse);
}

message SearchPeopleRequest {
  .shared.v1.Uuid user_id = 1;
  string query = 2;
  .shared.v1.PageRequest page = 3;
}

message SearchPeopleResponse {
  SearchResult result = 1;
}
