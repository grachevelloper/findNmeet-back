syntax = "proto3";

package search.v1;

import "google/protobuf/timestamp.proto";
import "shared/v1/common_types.proto";
import "vk/v1/models.proto";

enum AiSearchStatus {
  AI_SEARCH_STATUS_UNSPECIFIED = 0;
  AI_SEARCH_STATUS_BASELINE = 1;
  AI_SEARCH_STATUS_ENRICHING = 2;
  AI_SEARCH_STATUS_ENRICHED = 3;
}

message SearchCriteria {
  .shared.v1.Uuid id = 1;
  string raw_query = 2;
  .vk.v1.VkSearchFilters vk_filters = 3;
  google.protobuf.Timestamp parsed_at = 4;
}

message SearchResult {
  repeated .vk.v1.VkFavoriteProfile profiles = 1;
  int64 total_count = 2;
  .shared.v1.Uuid ai_criteria_id = 3;
  AiSearchStatus ai_status = 4;
  .shared.v1.PageResponse page = 5;
}
