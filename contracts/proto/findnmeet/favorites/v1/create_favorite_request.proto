syntax = "proto3";

package findnmeet.favorites.v1;

import "findnmeet/shared/v1/provider.proto";
import "findnmeet/vk/v1/profile.proto";

message CreateFavoriteRequest {
  .findnmeet.shared.v1.Provider  provider = 1;
  string                         external_id = 2;
  string                         note = 3;
  .findnmeet.vk.v1.VkProfile     vk_profile = 4;
}
