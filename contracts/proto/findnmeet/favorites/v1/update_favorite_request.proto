syntax = "proto3";

package findnmeet.favorites.v1;

import "findnmeet/favorites/v1/favorite_patch.proto";
import "findnmeet/shared/v1/uuid.proto";
import "google/protobuf/field_mask.proto";

message UpdateFavoriteRequest {
  .findnmeet.shared.v1.Uuid  favorite_id = 1;
  FavoritePatch              patch = 2;
  google.protobuf.FieldMask  update_mask = 3;
}
