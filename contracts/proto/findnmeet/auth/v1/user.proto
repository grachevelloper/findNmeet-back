syntax = "proto3";

package findnmeet.auth.v1;

import "findnmeet/auth/v1/user_status.proto";
import "findnmeet/shared/v1/uuid.proto";
import "google/protobuf/timestamp.proto";

message User {
  .findnmeet.shared.v1.Uuid id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.Timestamp last_active_at = 4;
  UserStatus status = 5;
}
