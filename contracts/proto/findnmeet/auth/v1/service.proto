syntax = "proto3";

package findnmeet.auth.v1;

import "findnmeet/auth/v1/complete_vk_oauth_request.proto";
import "findnmeet/auth/v1/complete_vk_oauth_response.proto";
import "findnmeet/auth/v1/get_external_links_request.proto";
import "findnmeet/auth/v1/get_external_links_response.proto";
import "findnmeet/auth/v1/get_user_request.proto";
import "findnmeet/auth/v1/get_user_response.proto";
import "findnmeet/auth/v1/refresh_session_request.proto";
import "findnmeet/auth/v1/refresh_session_response.proto";
import "findnmeet/auth/v1/revoke_session_request.proto";
import "findnmeet/auth/v1/revoke_session_response.proto";

service AuthService {
  rpc CompleteVkOAuth(CompleteVkOAuthRequest)
      returns (CompleteVkOAuthResponse);
  rpc GetUser(GetUserRequest)
      returns (GetUserResponse);
  rpc GetExternalLinks(GetExternalLinksRequest)
      returns (GetExternalLinksResponse);
  rpc RefreshSession(RefreshSessionRequest)
      returns (RefreshSessionResponse);
  rpc RevokeSession(RevokeSessionRequest)
      returns (RevokeSessionResponse);
}
