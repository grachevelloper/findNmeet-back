syntax = "proto3";

package findnmeet.auth.v1;

import "findnmeet/auth/v1/vk_external_link_metadata.proto";
import "findnmeet/shared/v1/provider.proto";
import "findnmeet/shared/v1/uuid.proto";
import "google/protobuf/timestamp.proto";

message UserExternalLink {
  .findnmeet.shared.v1.Uuid      id = 1;
  .findnmeet.shared.v1.Uuid      user_id = 2;
  .findnmeet.shared.v1.Provider  provider = 3;
  string                         external_id = 4;
  google.protobuf.Timestamp      linked_at = 5;
  google.protobuf.Timestamp      updated_at = 6;

  oneof provider_metadata {
    VkExternalLinkMetadata  vk = 7;
  }
}
