syntax = "proto3";

package findnmeet.search.v1;

import "findnmeet/shared/v1/page.proto";
import "findnmeet/shared/v1/uuid.proto";

message SearchPeopleRequest {
  .findnmeet.shared.v1.Uuid         user_id = 1;
  string                            query = 2;
  .findnmeet.shared.v1.PageRequest  page = 3;
}
