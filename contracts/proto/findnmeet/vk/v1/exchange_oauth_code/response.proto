syntax = "proto3";

package findnmeet.vk.v1.exchange_oauth_code;

option go_package = "github.com/findnmeet/vk-gateway/internal/gen/findnmeet/vk/v1/exchange_oauth_code;exchangeoauthcodev1";

import "findnmeet/vk/v1/oauth_tokens.proto";
import "findnmeet/vk/v1/profile.proto";

message ExchangeOAuthCodeResponse {
  string external_id = 1;
  VkOAuthTokens tokens = 2;
  VkProfile profile = 3;
}
