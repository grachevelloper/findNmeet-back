syntax = "proto3";

package findnmeet.vk.v1.search_profiles;

import "findnmeet/shared/v1/page.proto";
import "findnmeet/shared/v1/sensitive_string.proto";
import "findnmeet/vk/v1/search_filters.proto";

message SearchProfilesRequest {
  VkSearchFilters filters = 1;
  .findnmeet.shared.v1.PageRequest page = 2;
  .findnmeet.shared.v1.SensitiveString access_token = 3;
}
