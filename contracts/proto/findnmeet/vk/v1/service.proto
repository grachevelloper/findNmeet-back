syntax = "proto3";

package findnmeet.vk.v1;

option go_package = "github.com/findnmeet/vk-gateway/internal/gen/findnmeet/vk/v1;vkv1";

import "findnmeet/vk/v1/exchange_oauth_code_request.proto";
import "findnmeet/vk/v1/exchange_oauth_code_response.proto";
import "findnmeet/vk/v1/get_current_profile_request.proto";
import "findnmeet/vk/v1/get_current_profile_response.proto";
import "findnmeet/vk/v1/get_profile_request.proto";
import "findnmeet/vk/v1/get_profile_response.proto";
import "findnmeet/vk/v1/refresh_oauth_tokens_request.proto";
import "findnmeet/vk/v1/refresh_oauth_tokens_response.proto";
import "findnmeet/vk/v1/search_profiles_request.proto";
import "findnmeet/vk/v1/search_profiles_response.proto";

service VkGatewayService {
  rpc ExchangeOAuthCode(ExchangeOAuthCodeRequest)
      returns (ExchangeOAuthCodeResponse);
  rpc GetCurrentProfile(GetCurrentProfileRequest)
      returns (GetCurrentProfileResponse);
  rpc GetProfile(GetProfileRequest)
      returns (GetProfileResponse);
  rpc RefreshOAuthTokens(RefreshOAuthTokensRequest)
      returns (RefreshOAuthTokensResponse);
  rpc SearchProfiles(SearchProfilesRequest)
      returns (SearchProfilesResponse);
}
