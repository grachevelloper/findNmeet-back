syntax = "proto3";

package findnmeet.vk.v1;

import "findnmeet/vk/v1/online_status.proto";
import "findnmeet/vk/v1/private_message_status.proto";
import "findnmeet/vk/v1/profile_visibility.proto";
import "findnmeet/vk/v1/reference.proto";
import "findnmeet/vk/v1/relation_status.proto";
import "google/protobuf/timestamp.proto";

message VkProfile {
  int64 vk_user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string screen_name = 4;
  string photo_url = 5;
  VkReference city = 6;
  VkReference country = 7;
  string home_town = 8;
  VkReference university = 9;
  VkReference faculty = 10;
  optional int32 graduation_year = 11;
  string bdate_raw = 12;
  optional int32 age = 13;
  VkOnlineStatus online_status = 14;
  google.protobuf.Timestamp last_seen_at = 15;
  VkRelationStatus relation = 16;
  VkProfileVisibility visibility = 17;
  VkPrivateMessageStatus private_message_status = 18;
}
