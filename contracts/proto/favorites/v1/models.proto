syntax = "proto3";

package favorites.v1;

import "google/protobuf/timestamp.proto";
import "shared/v1/common_types.proto";
import "vk/v1/models.proto";

message Favorite {
  .shared.v1.Uuid id = 1;
  .shared.v1.Uuid user_id = 2;
  .shared.v1.Provider provider = 3;
  string external_id = 4;
  string display_title = 5;
  string display_image_url = 6;
  string note = 7;
  google.protobuf.Timestamp added_at = 8;
  google.protobuf.Timestamp updated_at = 9;

  oneof provider_details {
    .vk.v1.VkFavoriteProfile vk_profile = 10;
  }
}
