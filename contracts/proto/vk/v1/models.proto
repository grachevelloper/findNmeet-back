syntax = "proto3";

package vk.v1;

import "google/protobuf/timestamp.proto";
import "shared/v1/common_types.proto";

enum VkRelationStatus {
  VK_RELATION_STATUS_UNSPECIFIED = 0;
  VK_RELATION_STATUS_UNKNOWN = 1;
  VK_RELATION_STATUS_NOT_SPECIFIED = 2;
  VK_RELATION_STATUS_SINGLE = 3;
  VK_RELATION_STATUS_RELATIONSHIP = 4;
  VK_RELATION_STATUS_ENGAGED = 5;
  VK_RELATION_STATUS_MARRIED = 6;
  VK_RELATION_STATUS_COMPLICATED = 7;
  VK_RELATION_STATUS_SEARCHING = 8;
  VK_RELATION_STATUS_IN_LOVE = 9;
  VK_RELATION_STATUS_CIVIL_UNION = 10;
}

message VkFavoriteProfile {
  .shared.v1.Uuid favorite_id = 1;
  int64 vk_user_id = 2;
  string first_name = 3;
  string last_name = 4;
  string screen_name = 5;
  string photo_url = 6;
  .shared.v1.VkReference city = 7;
  .shared.v1.VkReference country = 8;
  string home_town = 9;
  .shared.v1.VkReference university = 10;
  .shared.v1.VkReference faculty = 11;
  int32 graduation_year = 12;
  string bdate_raw = 13;
  int32 age_snapshot = 14;
  bool online_snapshot = 15;
  google.protobuf.Timestamp last_seen_at = 16;
  VkRelationStatus relation = 17;
  bool is_closed = 18;
  bool can_access_closed = 19;
  bool can_write_private_message = 20;
  google.protobuf.Timestamp snapshot_updated_at = 21;
}

message VkProfileLookup {
  int64 vk_user_id = 1;
  string screen_name = 2;
}

message VkSearchFilters {
  string query = 1;
  .shared.v1.VkReference city = 2;
  .shared.v1.VkReference country = 3;
  .shared.v1.VkReference university = 4;
  .shared.v1.VkReference faculty = 5;
  int32 age_from = 6;
  int32 age_to = 7;
  int32 graduation_year = 8;
  VkRelationStatus relation = 9;
  bool online_only = 10;
}

message VkSearchResult {
  int64 total_count = 1;
  repeated VkFavoriteProfile profiles = 2;
}
