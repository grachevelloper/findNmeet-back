syntax = "proto3";

package vk.v1;

import "shared/v1/common_types.proto";
import "vk/v1/models.proto";

service VkGatewayService {
  rpc ExchangeOAuthCode(ExchangeOAuthCodeRequest) returns (ExchangeOAuthCodeResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc SearchProfiles(SearchProfilesRequest) returns (SearchProfilesResponse);
}

message ExchangeOAuthCodeRequest {
  string code = 1;
  string redirect_uri = 2;
}

message ExchangeOAuthCodeResponse {
  string external_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int32 expires_in_seconds = 4;
  VkFavoriteProfile profile = 5;
}

message GetProfileRequest {
  VkProfileLookup lookup = 1;
  string access_token = 2;
}

message GetProfileResponse {
  VkFavoriteProfile profile = 1;
}

message SearchProfilesRequest {
  VkSearchFilters filters = 1;
  .shared.v1.PageRequest page = 2;
  string access_token = 3;
}

message SearchProfilesResponse {
  VkSearchResult result = 1;
  .shared.v1.PageResponse page = 2;
}
