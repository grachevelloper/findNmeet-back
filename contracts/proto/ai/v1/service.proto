syntax = "proto3";

package ai.v1;

import "search/v1/models.proto";
import "shared/v1/common_types.proto";
import "vk/v1/models.proto";

service AiService {
  rpc ParseSearchQuery(ParseSearchQueryRequest) returns (ParseSearchQueryResponse);
}

message ParseSearchQueryRequest {
  .shared.v1.Uuid user_id = 1;
  string query = 2;
}

message ParseSearchQueryResponse {
  .vk.v1.VkSearchFilters vk_filters = 1;
  .search.v1.SearchCriteria criteria = 2;
}
