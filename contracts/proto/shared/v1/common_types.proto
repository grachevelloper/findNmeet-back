syntax = "proto3";

package shared.v1;

message Uuid {
  // RFC 4122 UUID encoded as 16 bytes.
  bytes value = 1;
}

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_VK = 1;
}

message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PageResponse {
  string next_page_token = 1;
}

message VkReference {
  int64 id = 1;
  string title = 2;
}
